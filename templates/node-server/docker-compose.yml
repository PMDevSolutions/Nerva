services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nerva-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-nerva}:${POSTGRES_PASSWORD:-nerva_secret}@postgres:5432/${POSTGRES_DB:-nerva_db}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nerva-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    container_name: nerva-postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nerva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nerva_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nerva_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nerva-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nerva} -d ${POSTGRES_DB:-nerva_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  nerva-network:
    driver: bridge
